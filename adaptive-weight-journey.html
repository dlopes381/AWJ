function bindCustomFoodFormHandlers(){
  document.getElementById('cf-back-btn').onclick = ()=>{ foodCreatingCustom = false; renderFoodOverlay(); };

    const name = document.getElementById('cf-name').value.trim();
    const brand = document.getElementById('cf-brand').value.trim();
    const amount = parseFloat(document.getElementById('cf-amount').value) || 100;
    const unit = document.getElementById('cf-unit').value;
    const calories = parseFloat(document.getElementById('cf-calories').value) || 0;
    const protein = parseFloat(document.getElementById('cf-protein').value) || 0;
    const carbs = parseFloat(document.getElementById('cf-carbs').value) || 0;
    const fat = parseFloat(document.getElementById('cf-fat').value) || 0;
    if(!name){ showToast('Enter a food name.'); return; }
    if(calories<=0){ showToast('Enter the calories for that serving.'); return; }

    const factor = 100 / amount;
    const round = (v,d)=> Math.round(v*Math.pow(10,d))/Math.pow(10,d);
    const food = {
      name, brand,
      servingSize: `${fmt(amount,0)}${unit}`,
      servingGrams: amount,
      per100: {
        calories: Math.round(calories*factor),
        protein: round(protein*factor,1), carbs: round(carbs*factor,1), fat: round(fat*factor,1),
        fiber: 0, sugar: 0, sodium: 0,
      },
      imageUrl: '',
    };
    const saved = FoodService.saveCustomFood(food);
    foodCreatingCustom = false;
    selectFood(saved);
  };
}

// ---------------- barcode scanning ----------------
// Uses the native BarcodeDetector API (Chrome/Edge) — no external library needed. Falls
// back to manual barcode entry (via FoodService.searchByBarcode) everywhere else.
function openBarcodeScan(){
  foodScanning = true;
  renderFoodOverlay();
}

function closeBarcodeScan(){
  foodScanning = false;
  stopScanStream();
  renderFoodOverlay();
}

function stopScanStream(){
  if(foodScanRAF) cancelAnimationFrame(foodScanRAF);
  foodScanRAF = null;
  if(foodScanStream){ foodScanStream.getTracks().forEach(t=>t.stop()); foodScanStream = null; }
}

function foodScanMarkup(){
  return `
    <div class="card stack">
      <div style="border-radius:12px; overflow:hidden; background:#000;">
        <video id="food-scan-video" autoplay playsinline muted style="width:100%; display:block;"></video>
      </div>
      <div class="helper" id="food-scan-status">Point your camera at a barcode.</div>
      <div class="field" style="margin-bottom:0;">
        <label>Or enter barcode manually</label>
        <div style="display:flex; gap:8px;">
          <input type="text" id="food-scan-manual" placeholder="e.g. 3017620422003" inputmode="numeric" style="flex:1;">
          <button type="button" class="btn btn-primary" id="food-scan-manual-btn" style="width:auto; padding:11px 16px;">Look up</button>
        </div>
      </div>
      <button type="button" class="btn btn-ghost" id="food-scan-cancel-btn">Cancel</button>
    </div>
  `;
}

async function bindBarcodeScanHandlers(){
  document.getElementById('food-scan-cancel-btn').onclick = closeBarcodeScan;
  document.getElementById('food-scan-manual-btn').onclick = ()=> lookupBarcode(document.getElementById('food-scan-manual').value);

  const statusEl = document.getElementById('food-scan-status');
  if(!('BarcodeDetector' in window)){
    statusEl.textContent = 'Live camera scanning needs Chrome or Edge on this device — enter the barcode number below instead.';
    return;
  }
  let stream;
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  }catch(e){
    statusEl.textContent = "Couldn't access the camera — enter the barcode number below instead.";
    return;
  }
  if(!foodScanning){ stream.getTracks().forEach(t=>t.stop()); return; } // overlay closed while awaiting camera permission
  foodScanStream = stream;
  const video = document.getElementById('food-scan-video');
  if(!video){ stopScanStream(); return; }
  video.srcObject = stream;

  const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e'] });
  const scanFrame = async ()=>{
    if(!foodScanning) return;
    try{
      const codes = await detector.detect(video);
      if(codes.length){ lookupBarcode(codes[0].rawValue); return; }
    }catch(e){}
    foodScanRAF = requestAnimationFrame(scanFrame);
  };
  video.onloadedmetadata = ()=> scanFrame();
}

async function lookupBarcode(code){
  code = (code||'').trim();
  if(!code) return;
  stopScanStream();
  const statusEl = document.getElementById('food-scan-status');
  if(statusEl) statusEl.textContent = 'Looking up…';
  try{
    const food = await FoodService.searchByBarcode(code);
    if(!food){ if(statusEl) statusEl.textContent = `No product found for barcode ${escapeHtml(code)}. Try a custom food instead.`; return; }
    foodScanning = false;
    selectFood(food);
  }catch(e){
    if(statusEl) statusEl.textContent = "Couldn't look up that barcode. Check your connection and try again.";
  }
}

// Adds the selected/scaled food as a calorie line-item to the active draft (reusing the
// still-blank default row, same convention as quickAddMeal), and folds its macros into the
// day's protein/carbs/fat fields — those are manual day-level totals (see data model), so a
// food-sourced item just adds on top of whatever's already typed in rather than replacing it.
function addFoodToMeal(){
  const f = foodSelected;
  const n = FoodService.calculateNutrition(f, foodServingQty, foodServingUnit);
  const arr = foodSearchMode==='new' ? activityDraftMeals : editActivityDraftMeals;
  const label = f.brand ? `${f.name} (${f.brand})` : f.name;
  const isBlankDefault = arr.length===1 && !arr[0].calories;
  const row = { id: isBlankDefault ? arr[0].id : cryptoId(), label: foodMealCategory, calories: n.calories, foodName: label };
  if(isBlankDefault){ arr[0] = row; } else { arr.push(row); }
  if(foodSearchMode==='new') activityDraftMeals = arr; else editActivityDraftMeals = arr;

  const prefix = foodSearchMode==='new' ? 'act' : 'eact';
  const proteinEl = document.getElementById(`${prefix}-protein`);
  const carbsEl = document.getElementById(`${prefix}-carbs`);
  const fatEl = document.getElementById(`${prefix}-fat`);
  if(proteinEl) proteinEl.value = fmt((parseFloat(proteinEl.value)||0) + n.protein, 1);
  if(carbsEl) carbsEl.value = fmt((parseFloat(carbsEl.value)||0) + n.carbs, 1);
  if(fatEl) fatEl.value = fmt((parseFloat(fatEl.value)||0) + n.fat, 1);

  FoodService.recordUsage(f);

  const containerId = `${prefix}-meals`;
  renderMealRows(containerId, arr, foodSearchMode);
  bindMealHandlers(foodSearchMode);
  closeFoodSearch();
  showToast(`Added ${label} — ${n.calories} cal`);
}

function startEditActivity(date){
  editingActivityDate = date;
  const n = state.nutritionLogs.find(x=>x.date===date);
  editActivityDraftMeals = n && n.meals && n.meals.length
    ? n.meals.map(m=>({id:m.id||cryptoId(), label: MEAL_CATEGORIES.includes(m.label)?m.label:'Other', calories:m.calories, ...(m.foodName?{foodName:m.foodName}:{})}))
    : [emptyMealRow()];
  renderLog();
}

async function saveEditActivity(originalDate){
  const date = document.getElementById('eact-date').value;
  const weightVal = parseFloat(document.getElementById('eact-weight').value);
  const protein = parseFloat(document.getElementById('eact-protein').value) || 0;
  const carbs = parseFloat(document.getElementById('eact-carbs').value) || 0;
  const fat = parseFloat(document.getElementById('eact-fat').value) || 0;
  const water = parseFloat(document.getElementById('eact-water').value) || 0;
  const notes = document.getElementById('eact-notes').value.trim();
  const meals = editActivityDraftMeals
    .filter(m=> parseFloat(m.calories)>0)
    .map(m=>({id:m.id||cryptoId(), label: MEAL_CATEGORIES.includes(m.label)?m.label:'Other', calories: parseFloat(m.calories)||0, ...(m.foodName?{foodName:m.foodName}:{})}));

  if(!date){ showToast('Enter a valid date.'); return; }
  const hasWeight = weightVal > 0;
  const hasMeals = meals.length > 0;
  if(!hasWeight && !hasMeals){ showToast('Enter a weight or at least one calorie entry.'); return; }

  if(hasWeight){
    const existingId = state.weightLogs.find(l=>l.date===originalDate)?.id;
    const outlier = findWeightOutlier(weightVal, date, existingId);
    if(outlier && !confirm(`That's ${fmt(outlier.diff,1)} lbs from your last entry (${fmt(outlier.mostRecent.weight)} lbs on ${prettyDate(outlier.mostRecent.date)}). Save ${fmt(weightVal)} lbs anyway?`)){
      return;
    }
  }

  // clear both the original date and the (possibly new) target date, then re-add
  state.weightLogs = state.weightLogs.filter(l=> l.date!==originalDate && l.date!==date);
  state.nutritionLogs = state.nutritionLogs.filter(n=> n.date!==originalDate && n.date!==date);
  if(hasWeight) state.weightLogs.push({id:cryptoId(), date, weight:weightVal, notes});
  if(hasMeals) state.nutritionLogs.push({id:cryptoId(), date, meals, protein, carbs, fat, water});

  editingActivityDate = null;
  await saveState();
  showToast('Entry updated.');
  renderAll();
}

async function deleteActivity(date){
  if(editingActivityDate===date) editingActivityDate = null;
  const removedWeight = state.weightLogs.filter(l=>l.date===date);
  const removedNutrition = state.nutritionLogs.filter(n=>n.date===date);
  if(!removedWeight.length && !removedNutrition.length) return;
  state.weightLogs = state.weightLogs.filter(l=>l.date!==date);
  state.nutritionLogs = state.nutritionLogs.filter(n=>n.date!==date);
  await saveState();
  renderAll();
  showToast("Entry deleted.", { actionLabel:'Undo', duration:5000, onAction: async ()=>{
    state.weightLogs.push(...removedWeight);
    state.nutritionLogs.push(...removedNutrition);
    await saveState();
    renderAll();
  }});
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// A same-DOM-node <details> is rebuilt fresh on every render call, so this just
// needs binding once per render — no dedup/cleanup required. Fades in whichever
// element follows <summary> when a disclosure is opened, for a smoother reveal.
function bindDisclosureAnimations(root){
  (root||document).querySelectorAll('details').forEach(d=>{
    d.addEventListener('toggle', ()=>{
      if(!d.open) return;
      const content = d.lastElementChild;
      if(!content || content.tagName==='SUMMARY') return;
      content.classList.remove('fade-in');
      void content.offsetWidth;
      content.classList.add('fade-in');
    });
  });
}

  });
  document.querySelectorAll('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  if(tab==='log'){ renderLog(); }
  window.scrollTo(0,0);
}

function renderAll(){
  renderDashboard();
  renderRoadmap();
  renderLog();
  renderSettings();
}

async function boot(){
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('app').classList.add('hidden');

  await loadState();

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('today-date').textContent = new Date().toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});

  if(!state.profile){
    document.getElementById('setup-screen').classList.remove('hidden');
    renderSetupScreen();
  } else {
    document.getElementById('app').classList.remove('hidden');
    renderAll();
    goTab(activeTab);
  }
}

boot();
</script>
</body>
</html>
