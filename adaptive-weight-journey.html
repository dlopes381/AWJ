<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Adaptive Weight Journey</title>
<meta name="theme-color" content="#2B6355">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AWJ">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%232B6355'/%3E%3Cpath d='M3 20L9 8L13 14L16 9L21 20' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%232B6355'/%3E%3Cpath d='M3 20L9 8L13 14L16 9L21 20' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
<link rel="manifest" href='data:application/manifest+json,{"name":"Adaptive Weight Journey","short_name":"AWJ","start_url":".","display":"standalone","background_color":"%23EEF2EC","theme_color":"%232B6355"}'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF2EC;
    --paper-alt:#E4EAE1;
    --ink:#152119;
    --ink-soft:#3C4A41;
    --pine:#2B6355;
    --pine-dark:#1B4238;
    --pine-tint:#DEEAE4;
    --moss:#7C9184;
    --gold:#D9A227;
    --gold-tint:#FBEFD2;
    --card:#FFFFFF;
    --line:#D7DED3;
    --danger:#B4553F;
    --sky:#4C7EA8;
    --radius:16px;
    --shadow: 0 1px 2px rgba(21,33,25,0.04), 0 4px 16px rgba(21,33,25,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    overscroll-behavior-y: contain;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  .display{font-family:'Space Grotesk', sans-serif;}
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    position:relative;
    padding-bottom:84px;
    background:
      radial-gradient(600px 300px at 100% -60px, var(--paper-alt), transparent 60%),
      var(--paper);
  }
  /* ---------- top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px 10px;
    background:linear-gradient(var(--paper) 70%, transparent);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:30px;height:30px;border-radius:8px;
    background:var(--pine); display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .brand-name{font-family:'Space Grotesk';font-weight:700;font-size:15px;letter-spacing:0.2px;}
  .brand-sub{font-size:10.5px;color:var(--moss);text-transform:uppercase;letter-spacing:1.2px;margin-top:1px;}
  .icon-btn{
    width:34px;height:34px;border-radius:10px;border:1px solid var(--line);
    background:var(--card); display:flex;align-items:center;justify-content:center;color:var(--ink-soft);
  }
  /* ---------- generic ---------- */
  .view{padding:4px 20px 28px;}
  .hidden{display:none !important;}
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    box-shadow:var(--shadow);
    transition: box-shadow .2s ease;
  }
  .stack > * + *{margin-top:14px;}
  h1.page-title{font-family:'Space Grotesk';font-size:22px;margin:6px 0 2px;letter-spacing:-0.2px;}
  .page-sub{color:var(--moss);font-size:13px;margin:0 0 18px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;letter-spacing:0.2px;}
  .field{margin-bottom:16px;}
  input[type=text], input[type=number], input[type=date], textarea, select{
    width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--line);
    background:var(--paper); font-family:'IBM Plex Sans'; font-size:14.5px; color:var(--ink);
  }
  input:focus, select:focus, textarea:focus, button:focus-visible{
    outline:2px solid var(--pine); outline-offset:1px;
  }
  input[readonly]{background:var(--paper-alt); color:var(--ink-soft); cursor:default;}
  textarea{resize:vertical; min-height:56px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .chip-group{display:flex; flex-wrap:wrap; gap:8px;}

  .advanced-details summary{
    cursor:pointer; font-size:12.5px; font-weight:600; color:var(--ink-soft);
    padding:4px 0; user-select:none;
  }
  .advanced-details summary:hover{color:var(--ink);}
  .meal-quick-add{margin-bottom:10px;}
  .meal-quick-add .chip{padding:7px 12px; font-size:12.5px;}
  .chip{
    padding:8px 13px; border-radius:999px; border:1px solid var(--line); background:var(--card);
    font-size:13px; font-weight:500; color:var(--ink-soft); cursor:pointer; user-select:none;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .chip.active{background:var(--pine); border-color:var(--pine); color:#fff;}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:13px 16px; border-radius:12px; border:none;
    font-family:'IBM Plex Sans'; font-weight:600; font-size:14.5px; cursor:pointer;
    transition: transform .12s ease, background .15s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--pine); color:#fff;}
  .btn-primary:active{background:var(--pine-dark); transform:scale(0.97);}
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--line);}
  .btn-danger{background:transparent; color:var(--danger); border:1px solid #E7CFC7;}
  .btn-link{
    width:auto; padding:6px 2px; background:none; border:none; color:var(--pine);
    font-weight:600; font-size:12.5px; text-decoration:underline; text-underline-offset:2px;
  }
  .helper{font-size:12px; color:var(--moss); margin-top:6px; line-height:1.5;}
  .badge{
    display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:0.4px; text-transform:uppercase;
    padding:3px 8px; border-radius:6px;
  }
  .badge-current{background:var(--gold); color:#fff;}
  .badge-reached{background:var(--pine-tint); color:var(--pine-dark);}
  .badge-upcoming{background:var(--paper-alt); color:var(--moss);}

  /* ---------- food search ---------- */
  .food-result-card{display:flex; gap:12px; padding:12px; border:1px solid var(--line); border-radius:12px; background:var(--card); cursor:pointer; transition:border-color .15s ease;}
  .food-result-card:active{border-color:var(--pine);}
  .food-thumb{width:52px; height:52px; border-radius:10px; object-fit:cover; background:var(--paper-alt); flex-shrink:0;}
  .food-thumb-placeholder{width:52px; height:52px; border-radius:10px; background:var(--paper-alt); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:20px;}
  .food-macro-row{display:flex; gap:10px; font-size:11.5px; color:var(--moss); margin-top:4px; flex-wrap:wrap;}
  .macro-track{height:7px; border-radius:99px; background:var(--paper-alt); overflow:hidden;}
  .macro-fill{height:100%; background:var(--pine); border-radius:99px; transition:width .4s ease;}

  /* ---------- bottom nav ---------- */
  .tabbar{
    position:fixed; bottom:0; left:0; right:0; z-index:30;
    display:flex; justify-content:center;
  }
  .tabbar-inner{
    width:100%; max-width:480px; display:flex;
    background:var(--card); border-top:1px solid var(--line);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  }
  .tab-btn{
    position:relative;
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    background:none; border:none; padding:6px 2px; color:var(--moss); cursor:pointer;
  }
  .tab-btn svg{transition: transform .15s ease;}
  .tab-btn span{font-size:10.5px; font-weight:600; letter-spacing:0.2px; transition: font-weight .15s ease, color .15s ease;}
  .tab-btn.active{color:var(--pine);}
  .tab-btn.active svg{transform:translateY(-1px) scale(1.08);}
  .tab-btn.active span{font-weight:700;}
  .tab-btn.active::after{
    content:''; position:absolute; bottom:1px; left:50%; transform:translateX(-50%);
    width:4px; height:4px; border-radius:50%; background:var(--pine);
  }

  /* ---------- dashboard hero ---------- */
  .hero-card{
    background:linear-gradient(160deg, var(--pine) 0%, var(--pine-dark) 100%);
    border-radius:20px; padding:22px 20px 18px; color:#fff; position:relative; overflow:hidden;
    box-shadow:var(--shadow);
  }
  .hero-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .hero-label{font-size:11.5px; text-transform:uppercase; letter-spacing:1.2px; opacity:0.75;}
  .hero-weight{font-family:'Space Grotesk'; font-size:38px; font-weight:700; margin-top:2px; line-height:1;}
  .hero-goal{font-size:12.5px; opacity:0.8; margin-top:4px;}
  .hero-progress-track{height:8px; border-radius:99px; background:rgba(255,255,255,0.22); margin-top:16px; overflow:hidden;}
  .hero-progress-fill{height:100%; background:var(--gold); border-radius:99px; transition:width .4s ease;}
  .hero-stats{display:flex; justify-content:space-between; margin-top:10px; font-size:11.5px; opacity:0.85;}
  .hero-target-value{transition: color .2s ease;}

  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .stat-box{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; transition: box-shadow .2s ease;}
  .stat-box .k{font-size:11px; color:var(--moss); text-transform:uppercase; letter-spacing:0.6px;}
  .stat-box .v{font-family:'IBM Plex Mono'; font-size:20px; font-weight:600; margin-top:4px;}
  .stat-box .sub{font-size:12px; color:var(--moss); margin-top:3px;}

  .section-title{font-family:'Space Grotesk'; font-weight:600; font-size:14.5px; margin:26px 0 12px; display:flex; align-items:center; justify-content:space-between;}
  .section-title:first-child{margin-top:0;}

  /* ---------- dashboard rhythm ---------- */
  .dash-top > * + *{margin-top:14px;}
  .insights-body > * + *{margin-top:0;}

  /* ---------- collapsible sections ---------- */
  .disclosure{margin-top:4px;}
  .disclosure > summary{
    cursor:pointer; list-style:none; user-select:none;
    display:flex; align-items:center; justify-content:space-between;
    font-family:'Space Grotesk'; font-weight:600; font-size:14.5px; color:var(--ink);
    padding:14px 2px; transition: color .15s ease;
  }
  .disclosure > summary::-webkit-details-marker{display:none;}
  .disclosure > summary:hover{color:var(--pine);}
  .disclosure > summary .disclosure-sub{font-family:'IBM Plex Sans'; font-weight:400; color:var(--moss); font-size:12px; margin-left:8px;}
  .disclosure > summary .chevron{
    display:inline-flex; color:var(--moss); transition: transform .25s ease; flex-shrink:0;
  }
  .disclosure[open] > summary .chevron{transform:rotate(180deg);}
  .disclosure-content.fade-in{animation: fadeInUp .28s ease;}
  @keyframes fadeInUp{ from{opacity:0; transform:translateY(-5px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- trail svg ---------- */
  .trail-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  .trail-wrap svg{display:block;}
  .phase-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:13px 14px; border:1px solid var(--line); border-radius:13px; background:var(--card);
    transition: box-shadow .2s ease, border-color .2s ease, background .2s ease, opacity .2s ease;
  }
  .phase-row + .phase-row{margin-top:8px;}
  .phase-left{display:flex; align-items:center; gap:12px;}
  .phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .phase-target{font-family:'IBM Plex Mono'; font-weight:600; font-size:15px;}
  .phase-cals{font-size:12px; color:var(--moss); margin-top:2px;}
  .phase-row.phase-completed{opacity:0.6;}
  .phase-row.phase-current{
    padding:16px 15px; border-color:var(--pine); border-width:1.5px;
    box-shadow:0 3px 14px rgba(43,99,85,0.14);
  }
  .phase-row.phase-current .phase-target{font-size:17px;}
  .phase-row.phase-current .phase-dot{width:11px; height:11px;}

  .banner{
    display:flex; gap:10px; align-items:flex-start; padding:13px 14px; border-radius:13px;
    background:var(--gold-tint); border:1px solid #F0DFAF; font-size:13px; color:#7A5A0C; line-height:1.45;
  }

  /* ---------- milestone card ---------- */
  .milestone-card{
    padding:16px 18px; border-radius:16px; background:var(--card); border:1px solid var(--line);
    box-shadow:var(--shadow); transition: background .3s ease, border-color .3s ease;
  }
  .milestone-head{display:flex; align-items:center; gap:7px; font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--moss);}
  .milestone-target{font-family:'Space Grotesk'; font-size:26px; font-weight:700; margin-top:6px; line-height:1;}
  .milestone-remaining{font-size:13.5px; font-weight:600; color:var(--pine-dark); margin-top:4px;}
  .milestone-progress-track{height:6px; border-radius:99px; background:var(--paper-alt); margin-top:12px; overflow:hidden;}
  .milestone-progress-fill{height:100%; background:var(--gold); border-radius:99px; transition:width .5s ease;}
  /* Hook for a future celebration animation: toggle .celebrate on the goal-reached
     transition (not on every render) to trigger a one-time confetti/pulse effect. */
  .milestone-card.reached{background:var(--pine-tint); border-color:var(--pine);}
  .milestone-card.reached .milestone-remaining{color:var(--pine-dark);}

  /* ---------- log entries ---------- */
  .log-entry{
    display:flex; flex-direction:column; gap:10px;
    padding:14px; border:1px solid var(--line); border-radius:13px; background:var(--card);
    transition: background .2s ease, border-color .2s ease;
  }
  .log-entry + .log-entry{margin-top:8px;}
  .log-entry.is-today{background:var(--pine-tint); border-color:var(--pine);}
  .log-entry-head{display:flex; justify-content:space-between; align-items:center;}
  .log-date{font-size:12.5px; font-weight:600; color:var(--ink); letter-spacing:0.2px; display:flex; align-items:center; gap:7px;}
  .today-pill{
    font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
    color:var(--pine-dark); background:#fff; border:1px solid var(--pine); padding:2px 6px; border-radius:99px;
  }
  .log-stats{display:flex; gap:22px;}
  .log-stat-label{font-size:10.5px; color:var(--moss); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px;}
  .log-weight{font-family:'IBM Plex Mono'; font-weight:600; font-size:17px;}
  .log-note{font-size:12px; color:var(--ink-soft); padding-top:8px; border-top:1px solid var(--line);}
  .log-actions{display:flex; gap:2px;}
  .del-btn{background:none;border:none;color:var(--moss);padding:6px;border-radius:8px;cursor:pointer;}
  .del-btn:hover{color:var(--ink); background:var(--paper-alt);}
  .log-edit-card{
    padding:14px; border:1px solid var(--pine); border-radius:13px; background:var(--pine-tint);
  }
  .log-edit-card + .log-entry, .log-edit-card + .log-edit-card{margin-top:8px;}
  .edit-actions{display:flex; gap:10px; margin-top:10px;}
  .edit-actions .btn{padding:10px 12px; font-size:13px;}

  .trend-label{
    display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600; margin-bottom:2px;
  }
  .trend-arrow{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .trend-sub{font-size:12px; color:var(--moss); margin-top:8px;}

  .empty-state{text-align:center; padding:40px 12px; color:var(--moss); font-size:13.5px;}

  /* setup screen */
  #setup-screen{max-width:480px;margin:0 auto;padding:28px 22px 40px;min-height:100vh;}
  .setup-hero{margin-bottom:22px;}
  .setup-hero .display{font-size:26px; font-weight:700; letter-spacing:-0.3px;}
  .setup-hero p{color:var(--moss); font-size:13.5px; margin-top:8px; line-height:1.55;}

  .toast{
    position:fixed; left:50%; transform:translateX(-50%); bottom:96px; z-index:50;
    background:var(--pine-dark); color:#fff; padding:12px 18px; border-radius:12px; font-size:13.5px;
    box-shadow:var(--shadow); max-width:400px; text-align:center;
  }
  .loading-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--moss);font-size:13px;}
</style>
</head>
<body>

<div id="loading" class="loading-wrap">Loading your roadmap…</div>

<div id="setup-screen" class="hidden"></div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 20L9 8L13 14L16 9L21 20" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <div class="brand-name">Adaptive Weight Journey</div>
        <div class="brand-sub" id="today-date"></div>
      </div>
    </div>
    <button class="icon-btn" onclick="goTab('settings')" aria-label="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c.14.36.22.75.22 1.15V10a2 2 0 010 4h-.09c-.4 0-.79.08-1.15.22z"/></svg>
    </button>
  </div>

  <div id="view-dashboard" class="view"></div>
  <div id="view-roadmap" class="view hidden"></div>
  <div id="view-log" class="view hidden"></div>
  <div id="view-settings" class="view hidden"></div>

  <div class="tabbar">
    <div class="tabbar-inner">
      <button class="tab-btn active" data-tab="dashboard" onclick="goTab('dashboard')">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 20L9 8L13 14L16 9L21 20"/></svg>
        <span>Trail</span>
      </button>
      <button class="tab-btn" data-tab="roadmap" onclick="goTab('roadmap')">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20l-5-2V4l5 2m0 14l6-2m-6 2V6m6 12l5 2V6l-5-2m0 16V4m0 2l-6-2"/></svg>
        <span>Roadmap</span>
      </button>
      <button class="tab-btn" data-tab="log" onclick="goTab('log')">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V4m8 8H4"/></svg>
        <span>Log</span>
      </button>
      <button class="tab-btn" data-tab="settings" onclick="goTab('settings')">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c.14.36.22.75.22 1.15V10a2 2 0 010 4h-.09c-.4 0-.79.08-1.15.22z"/></svg>
        <span>Setup</span>
      </button>
    </div>

// ---------------- calorie engine ----------------
const ACTIVITY_MULTIPLIERS = { sedentary:1.20, light:1.375, moderate:1.55, veryActive:1.725 };
const CALORIE_FLOOR = { male:1500, female:1200 };

function hasBodyStats(p){
  return !!(p && p.height && p.age && p.sex && p.activityLevel);
}

function calcBMR(weightLbs, heightIn, age, sex){
  const kg = weightLbs / 2.205;
  const cm = heightIn * 2.54;
  const base = 10*kg + 6.25*cm - 5*age;
  return Math.round(sex==='male'? base+5 : base-161);
}

function calcTDEE(bmr, activityLevel){
  return Math.round(bmr * (ACTIVITY_MULTIPLIERS[activityLevel] || ACTIVITY_MULTIPLIERS.sedentary));
}

function calcRecommendedMultiplier(tdee, weightLbs){
  return Math.round((tdee / weightLbs) * 10) / 10;
}

function calcStartingCalories(p){
  const goalType = p.goalType || 'loss';
  if(goalType==='gain') return Math.round(p.tdee + p.deficit);
  if(goalType==='maintain') return Math.round(p.tdee);
  return Math.round(p.tdee - p.deficit);
}

function calcProteinGoal(p, weightLbs){
  const goalType = p.goalType || 'loss';
  let perLb;
  if(goalType==='gain' || goalType==='maintain') perLb = 0.8;
  else perLb = p.deficit >= 750 ? 1.1 : p.deficit >= 500 ? 1.0 : 0.9; // more aggressive cuts need more protein to preserve muscle
  return Math.round(weightLbs * perLb);
}

// Derives carb/fat goals from the existing protein goal and calorie target rather than
// adding a separate manual goal-setting form: protein from calcProteinGoal, fat at a flat
// 25% of calories (a common default split), carbs get whatever calories remain.
function calcMacroGoals(p, weightLbs, calorieTarget){
  const protein = calcProteinGoal(p, weightLbs);
  const fat = Math.round((calorieTarget * 0.25) / 9);
  const carbs = Math.max(0, Math.round((calorieTarget - protein*4 - fat*9) / 4));
  return { protein, carbs, fat };
}

function calorieFloor(p){
  return CALORIE_FLOOR[p.sex] || CALORIE_FLOOR.female;
}

function calorieWarning(p, calories){
  return calories < calorieFloor(p);
}

// Calories are entered as multiple line-items (meals) per day and summed for display.
function nutritionTotalCalories(n){
  if(Array.isArray(n.meals) && n.meals.length){
    return n.meals.reduce((s,m)=> s + (parseFloat(m.calories)||0), 0);
  }
  return n.calories || 0;
}

// TDEE recalculated fresh at a given weight (not scaled proportionally from the
// starting TDEE) — BMR has a large weight-independent component (height, age,
// sex), so proportional scaling understates calories at lower weights and
// overstates them at higher weights the further you are from your start weight.
function tdeeAtWeight(p, weightLbs, calibrationFactor){
  const bmr = calcBMR(weightLbs, p.height, p.age, p.sex);
  const tdee = calcTDEE(bmr, p.activityLevel);
  return Math.round(tdee * (calibrationFactor || 1));
}

// ---------------- metabolic calibration ----------------
// Compares your logged calories vs. your actual weight trend to see whether your
// real-world metabolism runs above or below the population formula, and nudges
// future calorie targets accordingly. Purely derived from logs each time — nothing
// persisted, so it's never stale.
const CALIBRATION_WINDOW_DAYS = 28;
const MIN_CALIBRATION_NUTRITION_LOGS = 10;
const CALIBRATION_MIN_FACTOR = 0.75;
const CALIBRATION_MAX_FACTOR = 1.25;
const CAL_PER_LB = 3500;

function computeCalibration(){
  const p = state.profile;
  if(!hasBodyStats(p)) return null;

  const nutrition = [...state.nutritionLogs].sort((a,b)=> new Date(a.date)-new Date(b.date));
  if(nutrition.length===0) return null;
  const lastNutritionDate = new Date(nutrition[nutrition.length-1].date);
  const nCutoff = lastNutritionDate.getTime() - CALIBRATION_WINDOW_DAYS*86400000;
  const recentNutrition = nutrition.filter(n=> new Date(n.date).getTime() >= nCutoff);
  if(recentNutrition.length < MIN_CALIBRATION_NUTRITION_LOGS) return null;
  const avgDailyEaten = recentNutrition.reduce((s,n)=>s+nutritionTotalCalories(n),0)/recentNutrition.length;

  const weights = [...state.weightLogs].sort((a,b)=> new Date(a.date)-new Date(b.date));
  if(weights.length < MIN_COMPLETION_POINTS) return null;
  const lastWeightDate = new Date(weights[weights.length-1].date);
  const wCutoff = lastWeightDate.getTime() - CALIBRATION_WINDOW_DAYS*86400000;
  const recentWeights = weights.filter(l=> new Date(l.date).getTime() >= wCutoff);
  if(recentWeights.length < MIN_COMPLETION_POINTS) return null;

  const first = new Date(recentWeights[0].date);
  const xs = recentWeights.map(l=> (new Date(l.date)-first)/86400000);
  const ys = recentWeights.map(l=> l.weight);
  const { slope } = leastSquaresSlope(xs, ys); // lbs/day, negative = losing
  const avgWeightInWindow = ys.reduce((a,b)=>a+b,0)/ys.length;

  const calcTdee = tdeeAtWeight(p, avgWeightInWindow, 1);
  // Energy balance: actual calories burned = calories eaten - (weight change converted to calories)
  const actualTdee = avgDailyEaten - (slope * CAL_PER_LB);
  const rawFactor = actualTdee / calcTdee;
  const calibrationFactor = Math.min(CALIBRATION_MAX_FACTOR, Math.max(CALIBRATION_MIN_FACTOR, rawFactor));

  return {
    calibrationFactor,
    actualTdee: Math.round(actualTdee),
    calcTdee: Math.round(calcTdee),
    avgDailyEaten: Math.round(avgDailyEaten),
    windowDays: CALIBRATION_WINDOW_DAYS,
    nutritionLogs: recentNutrition.length,
    weightLogs: recentWeights.length,
    clamped: Math.abs(rawFactor-calibrationFactor) > 0.001,
  };
}

// ---------------- roadmap engine ----------------
// Reduces the deficit/surplus as you approach your goal (final third of the
// journey), matching common coaching guidance to ease off an aggressive cut
// as you get leaner so you preserve more muscle.
const TAPER_START_FRACTION = 0.66;
const TAPER_MIN_FACTOR = 0.6;

function taperedAdjustment(p, weightTarget){
  if(!p.taperDeficit || (p.goalType||'loss')==='maintain') return p.deficit;
  const totalRange = Math.abs(p.goalWeight - p.startWeight) || 1;
  const progressed = Math.abs(weightTarget - p.startWeight) / totalRange; // 0 at start .. 1 at goal
  if(progressed <= TAPER_START_FRACTION) return p.deficit;
  const t = Math.min(1, (progressed - TAPER_START_FRACTION) / (1 - TAPER_START_FRACTION));
  const factor = 1 - (1-TAPER_MIN_FACTOR)*t;
  return Math.round(p.deficit * factor);
}

function computePhaseMaintenance(p, weightTarget, calibrationFactor){
  if(p.calcMode!=='multiplier' && hasBodyStats(p)){
    return tdeeAtWeight(p, weightTarget, calibrationFactor);
  }
  return Math.round(weightTarget * p.multiplier);
}

function computePhaseEating(p, weightTarget, calibrationFactor){
  const maintenance = computePhaseMaintenance(p, weightTarget, calibrationFactor);
  const goalType = p.goalType || 'loss';
  const adjust = taperedAdjustment(p, weightTarget);
  if(goalType==='gain') return Math.round(maintenance + adjust);
  if(goalType==='maintain') return maintenance;
  return Math.round(maintenance - adjust);
}

function computePhases(p){
  const dir = p.goalWeight >= p.startWeight ? 1 : -1;
  const targets = [];
  let w = p.startWeight;
  if(dir>0){
    while (w < p.goalWeight - 0.001){ targets.push(Math.round(w*10)/10); w += p.interval; }
  } else {
    while (w > p.goalWeight + 0.001){ targets.push(Math.round(w*10)/10); w -= p.interval; }
  }
  targets.push(p.goalWeight);
  const dedup = [...new Set(targets)].sort((a,b)=> dir>0 ? a-b : b-a);
  const calibration = computeCalibration();
  const calibrationFactor = calibration ? calibration.calibrationFactor : 1;
  return dedup.map((t,i)=>({
    id:i+1,
    weightTarget:t,
    maintenance: computePhaseMaintenance(p,t,calibrationFactor),
    eating: computePhaseEating(p,t,calibrationFactor)
  }));
}

function phaseDirection(phases){
  return (phases.length>1 && phases[0].weightTarget < phases[1].weightTarget) ? 1 : -1;
}

function currentWeight(){
  if(state.weightLogs.length===0) return state.profile.startWeight;
  const sorted = [...state.weightLogs].sort((a,b)=> new Date(b.date)-new Date(a.date));
  return sorted[0].weight;
}

const ROLLING_WINDOW = 5;

// Weigh-ins fluctuate day to day, so phase progression is gated on the
// average of the last ROLLING_WINDOW weigh-ins rather than a single reading.
function rollingAverageWeight(n=ROLLING_WINDOW){
  if(state.weightLogs.length===0) return state.profile.startWeight;
  const sorted = [...state.weightLogs].sort((a,b)=> new Date(b.date)-new Date(a.date));
  const recent = sorted.slice(0, n);
  return recent.reduce((s,l)=>s+l.weight,0)/recent.length;
}

// Flags a new weigh-in that's an implausible jump from the last logged entry (most
// often a typo), scaled by how many days have passed since that entry so a real
// change after a long gap isn't mistaken for a data-entry error.
function findWeightOutlier(newWeight, date, excludeId){
  const others = state.weightLogs.filter(l=> l.id !== excludeId);
  if(others.length===0) return null;
  const sorted = [...others].sort((a,b)=> new Date(b.date)-new Date(a.date));
  const mostRecent = sorted[0];
  const daysSince = Math.max(1, Math.abs((new Date(date) - new Date(mostRecent.date))/86400000));
  const threshold = Math.min(40, 8 + daysSince*1.5);
  const diff = Math.abs(newWeight - mostRecent.weight);
  return diff > threshold ? { mostRecent, diff } : null;
}

function getActivePhase(phases, w){
  const dir = phaseDirection(phases);
  for(const ph of phases){
    if(dir>0){ if(w < ph.weightTarget) return ph; }
    else { if(w > ph.weightTarget) return ph; }
  }
  return phases[phases.length-1];
}

function isGoalReached(){
  const p = state.profile;
  const avg = rollingAverageWeight();
  if(p.goalWeight >= p.startWeight) return avg >= p.goalWeight - 0.001;
  return avg <= p.goalWeight + 0.001;
}

// ---------------- utils ----------------
function fmt(n, d=1){ return Number(n).toFixed(d).replace(/\.0$/,''); }
function todayStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function prettyDate(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString(undefined, {month:'short', day:'numeric'});
}
// opts.actionLabel + opts.onAction render a clickable action (e.g. "Undo") inside the toast.
function showToast(msg, opts={}){
  const t = document.createElement('div');
  t.className='toast';
  if(opts.actionLabel && opts.onAction){
    const label = document.createElement('span');
    label.textContent = msg;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = opts.actionLabel;
    btn.style.cssText = 'margin-left:12px;background:none;border:none;color:var(--gold-tint);font-weight:700;text-decoration:underline;cursor:pointer;padding:0;font-size:13.5px;';
    btn.onclick = async ()=>{ t.remove(); await opts.onAction(); };
    t.appendChild(label);
    t.appendChild(btn);
  } else {
    t.textContent = msg;
  }
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), opts.duration || 3800);
}

// ---------------- engagement (streaks & consistency) ----------------
// A logged day counts toward the streak/consistency stats if either weight or
// nutrition was recorded that date — matches how the Log tab's History treats a day.
function loggedDatesSet(){
  return new Set([...state.weightLogs.map(l=>l.date), ...state.nutritionLogs.map(n=>n.date)]);
}
function dateKeyFor(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
// Counts consecutive logged days ending today. If today hasn't been logged yet,
// counting starts from yesterday so the streak doesn't reset to 0 first thing each morning.
function computeLoggingStreak(){
  const dates = loggedDatesSet();
  if(dates.size===0) return 0;
  const cursor = new Date(todayStr()+'T00:00:00');
  if(!dates.has(dateKeyFor(cursor))) cursor.setDate(cursor.getDate()-1);
  let streak = 0;
  while(dates.has(dateKeyFor(cursor))){
    streak++;
    cursor.setDate(cursor.getDate()-1);
  }
  return streak;
}
// How many of the last `days` calendar days (including today) have a logged entry.
function loggingConsistency(days=7){
  const dates = loggedDatesSet();
  const cursor = new Date(todayStr()+'T00:00:00');
  let count = 0;
  for(let i=0;i<days;i++){
    if(dates.has(dateKeyFor(cursor))) count++;
    cursor.setDate(cursor.getDate()-1);
  }
  return count;
}

function readSetupFormValues(prefix){
  const val = id => document.getElementById(`${prefix}${id}`);
  const startWeight = parseFloat(val('current').value);
  const height = parseFloat(val('height').value);
  const age = parseFloat(val('age').value);
  const sex = document.querySelector(`#${prefix}grp-sex .chip.active`)?.dataset.val;
  const activityLevel = document.querySelector(`#${prefix}grp-activity .chip.active`)?.dataset.val;
  const goalType = document.querySelector(`#${prefix}grp-goaltype .chip.active`)?.dataset.val || 'loss';
  const goalWeightInput = parseFloat(val('goal')?.value);
  const goalWeight = goalType==='maintain' ? startWeight : goalWeightInput;
  const calcMode = document.querySelector(`#${prefix}grp-calcmode .chip.active`)?.dataset.val || 'auto';
  const multiplierChip = document.querySelector(`#${prefix}grp-multiplier .chip.active`)?.dataset.val;
  const deficitChip = document.querySelector(`#${prefix}grp-deficit .chip.active`)?.dataset.val;
  const deficitCustom = parseFloat(val('deficit-custom')?.value);
  const deficit = deficitChip==='custom' ? (deficitCustom||500) : parseFloat(deficitChip||500);
  const interval = parseFloat(document.querySelector(`#${prefix}grp-interval .chip.active`)?.dataset.val || 5);
  const taperDeficit = document.querySelector(`#${prefix}grp-taper .chip.active`)?.dataset.val === 'on';

  let bmr=null, tdee=null, recommendedMultiplier=null;
  if(startWeight && height && age && sex && activityLevel){
    bmr = calcBMR(startWeight, height, age, sex);
    tdee = calcTDEE(bmr, activityLevel);
    recommendedMultiplier = calcRecommendedMultiplier(tdee, startWeight);
  }
  const multiplier = calcMode==='multiplier'
    ? parseFloat(multiplierChip || (recommendedMultiplier? Math.round(recommendedMultiplier):12))
    : (recommendedMultiplier ? Math.round(recommendedMultiplier) : parseFloat(multiplierChip||12));

  return { startWeight, height, age, sex, activityLevel, goalType, goalWeight, calcMode, multiplier, deficit, interval, taperDeficit, bmr, tdee, recommendedMultiplier };
}

function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function endOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate(), 23,59,59,999); }

function dateFilterLabel(val){ return (DATE_FILTERS.find(f=>f.val===val)||{}).label || val; }

function getDateRange(preset){
  const today = startOfDay(new Date());
  let start, end = today;
  switch(preset){
    case 'today':
      start = today; break;
    case 'yesterday':
      start = new Date(today); start.setDate(start.getDate()-1);
      end = start; break;
    case 'thisWeek':
      start = new Date(today); start.setDate(start.getDate() - today.getDay());
      break;
    case 'lastWeek': {
      const thisWeekStart = new Date(today); thisWeekStart.setDate(thisWeekStart.getDate() - today.getDay());
      start = new Date(thisWeekStart); start.setDate(start.getDate()-7);
      end = new Date(thisWeekStart); end.setDate(end.getDate()-1);
      break;
    }
    case 'thisMonth':
      start = new Date(today.getFullYear(), today.getMonth(), 1);
      break;
    case 'lastMonth':
      start = new Date(today.getFullYear(), today.getMonth()-1, 1);
      end = new Date(today.getFullYear(), today.getMonth(), 0);
      break;
    case 'thisYear':
      start = new Date(today.getFullYear(), 0, 1);
      break;
    case 'lastYear':
      start = new Date(today.getFullYear()-1, 0, 1);
      end = new Date(today.getFullYear()-1, 11, 31);
      break;
    case 'allTime':
    default: {
      const allDates = [...state.weightLogs.map(l=>l.date), ...state.nutritionLogs.map(n=>n.date)];
      start = allDates.length
        ? startOfDay(new Date(Math.min(...allDates.map(d=> new Date(d+'T00:00:00').getTime()))))
        : today;
      break;
    }
  }
  return { start, end: endOfDay(end) };
}

function categoryTotalsForRange(preset){
  const { start, end } = getDateRange(preset);
  const totals = {};
  MEAL_CATEGORIES.forEach(c=> totals[c]=0);
  state.nutritionLogs.forEach(n=>{
    const d = new Date(n.date+'T00:00:00');
    if(d < start || d > end) return;
    (n.meals||[]).forEach(m=>{
      const cat = MEAL_CATEGORIES.includes(m.label) ? m.label : 'Other';
      totals[cat] += parseFloat(m.calories)||0;
    });
  });
  return totals;
}

// Manual donut (stroke-dasharray circle segments) rather than the SVG pathLength
// attribute, so it renders consistently across older browsers too.
function renderDonutChart(totals, opts={}){
  const size = opts.size || 150;
  const strokeW = opts.strokeWidth || 22;
  const showLegend = opts.showLegend !== false;
  const r = (size - strokeW)/2;
  const cx = size/2, cy = size/2;
  const circumference = 2*Math.PI*r;

  const entries = MEAL_CATEGORIES.map(c=>({cat:c, val: totals[c]||0})).filter(e=>e.val>0);
  const total = entries.reduce((s,e)=>s+e.val,0);
  if(total<=0){
    return `<div class="empty-state" style="padding:24px 12px;">No calories logged in this range.</div>`;
  }

  let offset = 0;
  const arcs = entries.map(e=>{
    const frac = e.val/total;
    const len = frac*circumference;
    const dasharray = `${len} ${circumference-len}`;
    const dashoffset = -offset;
    offset += len;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${MEAL_CATEGORY_COLORS[e.cat]}" stroke-width="${strokeW}" stroke-dasharray="${dasharray}" stroke-dashoffset="${dashoffset}" transform="rotate(-90 ${cx} ${cy})"/>`;
  }).join('');

  const svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    ${arcs}
    <text x="${cx}" y="${cy-3}" text-anchor="middle" class="mono" style="font-size:${Math.round(size*0.1)}px; font-weight:700; fill:var(--ink);">${Math.round(total)}</text>
    <text x="${cx}" y="${cy+13}" text-anchor="middle" style="font-size:9px; fill:var(--moss); text-transform:uppercase; letter-spacing:0.5px;">total cal</text>
  </svg>`;

  if(!showLegend){
    return `<div style="display:flex; justify-content:center;">${svg}</div>`;
  }

  const legend = entries.map(e=>{
    const pct = Math.round((e.val/total)*1000)/10;
    return `<div style="display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--line);">
      <div style="display:flex; align-items:center; gap:8px;"><span style="width:10px;height:10px;border-radius:50%;background:${MEAL_CATEGORY_COLORS[e.cat]};flex-shrink:0;"></span><span style="font-size:13px;">${e.cat}</span></div>
      <div class="mono" style="font-size:13px; font-weight:600;">${Math.round(e.val)} cal <span style="color:var(--moss); font-weight:400;">(${fmt(pct,1)}%)</span></div>
    </div>`;
  }).join('');

  return `<div style="display:flex; align-items:center; gap:18px; flex-wrap:wrap;">
    ${svg}
    <div style="flex:1; min-width:160px;">${legend}</div>
  </div>`;
}

function renderCompareView(filterA, filterB){
  const totalsA = categoryTotalsForRange(filterA);
  const totalsB = categoryTotalsForRange(filterB);
  const totalA = MEAL_CATEGORIES.reduce((s,c)=>s+totalsA[c],0);
  const totalB = MEAL_CATEGORIES.reduce((s,c)=>s+totalsB[c],0);

  const rows = MEAL_CATEGORIES.map(c=>{
    const a = totalsA[c], b = totalsB[c];
    if(a===0 && b===0) return '';
    const diff = b-a;
    const diffLabel = diff===0 ? 'No change' : `${diff>0?'+':''}${Math.round(diff)} cal`;
    const diffColor = diff>0 ? 'var(--danger)' : diff<0 ? 'var(--pine)' : 'var(--moss)';
    return `<div class="log-entry">
      <div>
        <div class="log-date">${c}</div>
        <div class="log-weight" style="font-size:14.5px;">${Math.round(a)} → ${Math.round(b)} cal</div>
      </div>
      <div class="mono" style="font-weight:600; color:${diffColor};">${diffLabel}</div>
    </div>`;
  }).join('');

  const totalDiff = totalB-totalA;
  return `
    <div class="row2" style="margin-bottom:14px;">
      <div>
        <div class="helper" style="margin-bottom:8px; font-weight:600; text-align:center;">${dateFilterLabel(filterA)}</div>
        ${renderDonutChart(totalsA, {size:120, strokeWidth:18, showLegend:false})}
      </div>
      <div>
        <div class="helper" style="margin-bottom:8px; font-weight:600; text-align:center;">${dateFilterLabel(filterB)}</div>
        ${renderDonutChart(totalsB, {size:120, strokeWidth:18, showLegend:false})}
      </div>
    </div>
    <div class="helper" style="margin-bottom:8px;">Change by category</div>
    <div class="stack">${rows || `<div class="empty-state" style="padding:16px 12px;">No calories logged in either range.</div>`}</div>
    <div class="helper" style="margin-top:12px; text-align:center;">Total: ${Math.round(totalA)} cal → ${Math.round(totalB)} cal (${totalDiff>=0?'+':''}${Math.round(totalDiff)} cal)</div>
  `;
}

// One-tap weight entry from the dashboard, separate from the full Log activity form.
// Preserves any existing same-day notes rather than blanking them (the full form
// would otherwise overwrite them since it has no notes field of its own here).
// One-tap entry from the dashboard, always scoped to today's date (matches the card's
// "Today, <date>" label — there's no date picker here, that's what the full Log tab is for).
// weightVal/calVal are null when that field was left blank.
// Weight replaces today's weigh-in (like the full form). Calories only touches
// today's nutrition log if the number actually differs from today's current total,
// so re-saving an unchanged, prefilled total can't silently flatten an itemized
// multi-meal day down to a single "Other" line.
async function quickLogEntry(weightVal, calVal){
  const date = todayStr();
  const existingWeight = state.weightLogs.find(l=>l.date===date);
  const existingNutrition = state.nutritionLogs.find(n=>n.date===date);
  const currentTotal = existingNutrition ? nutritionTotalCalories(existingNutrition) : 0;

  const hasWeight = weightVal !== null && weightVal > 0;
  const calChanged = calVal !== null && calVal !== currentTotal;
  if(!hasWeight && !calChanged){ showToast('Enter a weight or a new calorie amount.'); return; }

  if(hasWeight){
    const outlier = findWeightOutlier(weightVal, date, existingWeight?.id);
    if(outlier && !confirm(`That's ${fmt(outlier.diff,1)} lbs from your last entry (${fmt(outlier.mostRecent.weight)} lbs on ${prettyDate(outlier.mostRecent.date)}). Save ${fmt(weightVal)} lbs anyway?`)){
      return;
    }
  }

  const p = state.profile;
  const phases = computePhases(p);
  const activeBefore = getActivePhase(phases, rollingAverageWeight());
  const goalBefore = isGoalReached();
  const wasLogged = !!(existingWeight || existingNutrition);

  if(hasWeight){
    state.weightLogs = state.weightLogs.filter(l=>l.date!==date);
    state.weightLogs.push({id:cryptoId(), date, weight:weightVal, notes: existingWeight ? existingWeight.notes : ''});
  }
  if(calChanged){
    state.nutritionLogs = state.nutritionLogs.filter(n=>n.date!==date);
    if(calVal > 0){
      state.nutritionLogs.push({
        id:cryptoId(), date,
        meals:[{id:cryptoId(), label:'Other', calories:calVal}],
        protein: existingNutrition?existingNutrition.protein:0,
        carbs: existingNutrition?existingNutrition.carbs:0,
        fat: existingNutrition?existingNutrition.fat:0,
        water: existingNutrition?existingNutrition.water:0
      });
    }
  }
  await saveState();

  const activeAfter = getActivePhase(phases, rollingAverageWeight());
  const goalAfter = isGoalReached();
  if(goalAfter && !goalBefore){
    showToast(`🎉 Goal reached! You hit your target weight of ${fmt(p.goalWeight,0)} lbs.`);
  } else if(hasWeight && activeAfter.id !== activeBefore.id){
    showToast(`🏁 Milestone reached! Calorie target updated from ${activeBefore.eating} to ${activeAfter.eating}.`);
  } else {
    showToast(wasLogged ? "Today's entry updated." : "Today's entry logged.");
  }
  renderAll();
}

  const todaysNutrition = state.nutritionLogs.find(n=>n.date===todayStr());
  const eatenToday = todaysNutrition ? nutritionTotalCalories(todaysNutrition) : 0;

  const calibration = hasBodyStats(p) ? computeCalibration() : null;

  const todaysWeightLog = state.weightLogs.find(l=>l.date===todayStr());

  const activeIdx = phases.findIndex(ph=>ph.id===active.id);
  const prevTarget = activeIdx>0 ? phases[activeIdx-1].weightTarget : p.startWeight;
  const segmentTotal = Math.abs(active.weightTarget - prevTarget) || 1;
  const segmentProgressed = Math.max(0, Math.abs(avgW - prevTarget));
  const milestonePct = goalDone ? 100 : Math.max(0, Math.min(100, (segmentProgressed/segmentTotal)*100));

            ${!goalDone? `<div class="hero-goal">${fmt(eatenToday,0)} eaten · ${remainingCals>=0? fmt(remainingCals,0)+' left' : fmt(Math.abs(remainingCals),0)+' over'}</div>` : ''}

function renderTrailSVG(phases, cw){
  const n = phases.length;
  const stepX = 46;
  const w = Math.max(320, n*stepX + 40);
  const h = 130;
  const amp = 30;
  const baseY = h/2;
  const activeIdx = phases.findIndex(ph=>ph===getActivePhase(phases,cw));

  let pathD = '';
  const points = phases.map((ph,i)=>{
    const x = 24 + i*stepX;
    const y = baseY + Math.sin(i*0.9)*amp*0.6;
    return {x,y,ph,i};
  });
  points.forEach((pt,i)=>{
    pathD += (i===0? `M ${pt.x} ${pt.y}` : ` L ${pt.x} ${pt.y}`);
  });

  const completedPathPts = points.slice(0, activeIdx+1);
  let completedD = '';
  completedPathPts.forEach((pt,i)=>{ completedD += (i===0? `M ${pt.x} ${pt.y}` : ` L ${pt.x} ${pt.y}`); });

  const dots = points.map((pt,i)=>{
    let fill, stroke, r=6, status;
    if(i < activeIdx){ fill='var(--pine)'; stroke='var(--pine)'; status='Reached'; }
    else if(i === activeIdx){ fill='var(--gold)'; stroke='var(--gold)'; r=7.5; status='Current'; }
    else { fill='var(--card)'; stroke='var(--moss)'; status='Upcoming'; }
    const label = `${status} · ${fmt(pt.ph.weightTarget,0)} lbs · ${pt.ph.eating} cal/day`;
    return `<circle cx="${pt.x}" cy="${pt.y}" r="10" fill="transparent" style="cursor:pointer;" onmousemove="showTrailTip(event,'${label}')" onmouseleave="hideTrailTip()"></circle>
      <circle cx="${pt.x}" cy="${pt.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" style="pointer-events:none;"/>`;
  }).join('');

  return `<div class="trail-tip-wrap" style="position:relative;">
    <svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">
      <path d="${pathD}" fill="none" stroke="var(--line)" stroke-width="3" stroke-dasharray="1 8" stroke-linecap="round"/>
      <path d="${completedD}" fill="none" stroke="var(--pine)" stroke-width="3" stroke-linecap="round"/>
      ${dots}
    </svg>
    <div id="trail-tip" class="mono" style="display:none; position:absolute; pointer-events:none; background:var(--pine-dark); color:#fff; font-size:11.5px; padding:5px 9px; border-radius:8px; white-space:nowrap; transform:translate(-50%,-115%); z-index:5;"></div>
  </div>`;
}

// tipId defaults to 'trail-tip' so existing callers (the Trail chart) are unaffected;
// other charts on the same page pass their own tipId so tooltips don't collide.
function showTrailTip(evt, label, tipId){
  const tip = document.getElementById(tipId || 'trail-tip');
  const wrap = evt.currentTarget.closest('.trail-tip-wrap');
  if(!wrap || !tip) return;
  const rect = wrap.getBoundingClientRect();
  tip.textContent = label;
  tip.style.transform = 'translateY(-115%)';
  tip.style.left = '0px';
  tip.style.display = 'block';
  const x = evt.clientX - rect.left + wrap.scrollLeft;
  const half = tip.offsetWidth / 2;
  const clampedX = Math.min(Math.max(x, half), wrap.scrollWidth - half);
  tip.style.left = clampedX + 'px';
  tip.style.top = (evt.clientY - rect.top) + 'px';
  tip.style.transform = 'translate(-50%,-115%)';
}
function hideTrailTip(tipId){
  const tip = document.getElementById(tipId || 'trail-tip');
  if(tip) tip.style.display = 'none';
}

function leastSquaresSlope(xs, ys){
  const n = xs.length;
  const sumX = xs.reduce((a,b)=>a+b,0);
  const sumY = ys.reduce((a,b)=>a+b,0);
  const sumXY = xs.reduce((s,x,i)=> s + x*ys[i], 0);
  const sumX2 = xs.reduce((s,x)=> s + x*x, 0);
  const denom = (n*sumX2 - sumX*sumX);
  const slope = denom === 0 ? 0 : (n*sumXY - sumX*sumY) / denom; // lbs per day
  const intercept = (sumY - slope*sumX)/n;
  return { slope, intercept };
}

function computeTrend(){
  const logs = [...state.weightLogs].sort((a,b)=> new Date(a.date)-new Date(b.date));
  if(logs.length < 2) return null;
  const first = new Date(logs[0].date);
  const xs = logs.map(l => (new Date(l.date) - first)/86400000);
  const ys = logs.map(l => l.weight);
  const { slope, intercept } = leastSquaresSlope(xs, ys);
  const slopePerWeek = slope*7;
  return { logs, xs, ys, slope, intercept, slopePerWeek };
}

// ---------------- completion estimate ----------------
const COMPLETION_WINDOW_DAYS = 21;
const MIN_COMPLETION_POINTS = 4;
// A goal date is a long extrapolation from a short-term pace. Require a minimum
// tracking history, and cap how far past that history the projection is allowed
// to reach, so a few noisy days can't produce a wildly overconfident date.
const MIN_GOAL_TRACKING_DAYS = 21;
const MAX_GOAL_EXTRAPOLATION_RATIO = 6;

// Uses only the most recent weigh-ins (not full history) so the estimate reflects
// current pace, not a stale average from before a diet/activity change.
function computeRecentTrend(windowDays=COMPLETION_WINDOW_DAYS){
  const logs = [...state.weightLogs].sort((a,b)=> new Date(a.date)-new Date(b.date));
  if(logs.length < 2) return null;
  const lastDate = new Date(logs[logs.length-1].date);
  const cutoff = lastDate.getTime() - windowDays*86400000;
  const recentLogs = logs.filter(l=> new Date(l.date).getTime() >= cutoff);
  if(recentLogs.length < MIN_COMPLETION_POINTS) return null;
  const first = new Date(recentLogs[0].date);
  const xs = recentLogs.map(l => (new Date(l.date) - first)/86400000);
  const ys = recentLogs.map(l => l.weight);
  const { slope } = leastSquaresSlope(xs, ys);
  return { logs: recentLogs, slope, slopePerWeek: slope*7 };
}

function prettyDateObj(dt){
  return dt.toLocaleDateString(undefined, {month:'short', day:'numeric'});
}

function estimateCompletion(){
  const p = state.profile;
  if(isGoalReached()) return { status:'reached' };
  const recent = computeRecentTrend();
  if(!recent) return { status:'insufficient' };

  const dir = p.goalWeight >= p.startWeight ? 1 : -1;
  const movingTowardGoal = dir>0 ? recent.slope > 0.02 : recent.slope < -0.02;
  if(!movingTowardGoal) return { status:'stalled' };

  const avgW = rollingAverageWeight();
  const phases = computePhases(p);
  const active = getActivePhase(phases, avgW);
  const goalDistance = Math.max(0, dir>0 ? (p.goalWeight-avgW) : (avgW-p.goalWeight));
  const phaseDistance = Math.max(0, dir>0 ? (active.weightTarget-avgW) : (avgW-active.weightTarget));
  const pace = Math.abs(recent.slope);
  const goalDays = Math.round(goalDistance/pace);
  const phaseDays = Math.round(phaseDistance/pace);
  const today = new Date();
  const phaseDate = new Date(today.getTime() + phaseDays*86400000);

  const allLogs = [...state.weightLogs].sort((a,b)=> new Date(a.date)-new Date(b.date));
  const trackedDays = Math.round((new Date(allLogs[allLogs.length-1].date) - new Date(allLogs[0].date))/86400000);
  const goalConfident = trackedDays >= MIN_GOAL_TRACKING_DAYS && goalDays <= trackedDays * MAX_GOAL_EXTRAPOLATION_RATIO;
  const goalDate = goalConfident ? new Date(today.getTime() + goalDays*86400000) : null;

  return { status:'ok', goalDays, goalDate, goalConfident, trackedDays, phaseDays, phaseDate, windowLogs: recent.logs.length };
}

// A slope measured over just a day or two of noisy day-to-day weight fluctuation
// is too unreliable to extrapolate into a "lbs/week" claim (see estimateCompletion,
// which applies the same kind of guard to its longer-range projection).
const MIN_TREND_SPAN_DAYS = 4;

function renderTrendChart(){
  const trend = computeTrend();
  if(!trend){
    return `<div class="empty-state">Log at least 2 weigh-ins to see your trend.</div>`;
  }
  const { logs, ys, slope, intercept, xs, slopePerWeek } = trend;
  const n = logs.length;
  const daysSpan = xs[n-1] - xs[0];
  const stepX = Math.max(28, Math.min(50, 340/(n-1||1)));
  const padTop=18, padBottom=26, padLeft=14;
  const w = Math.max(280, padLeft*2 + (n-1)*stepX);
  const h = 150;
  const minW = Math.min(...ys), maxW = Math.max(...ys);
  const range = (maxW - minW) || 1;
  const plotTop = padTop, plotBottom = h - padBottom;
  const mapY = (val)=> plotTop + ( (maxW - val) / range ) * (plotBottom - plotTop);
  const mapX = (i)=> padLeft + i*stepX;

  let lineD = '';
  logs.forEach((l,i)=>{
    const x = mapX(i), y = mapY(l.weight);
    lineD += (i===0? `M ${x} ${y}` : ` L ${x} ${y}`);
  });

  const yStart = intercept + xs[0]*slope;
  const yEnd = intercept + xs[n-1]*slope;
  const trendX1 = mapX(0), trendY1 = mapY(yStart);
  const trendX2 = mapX(n-1), trendY2 = mapY(yEnd);

  let color, label, arrow;
  if(daysSpan < MIN_TREND_SPAN_DAYS){
    color='var(--moss)'; label=`Only ${Math.round(daysSpan)} day${Math.round(daysSpan)===1?'':'s'} of history so far — keep logging for a reliable weekly trend`; arrow='flat';
  } else if(slopePerWeek <= -2.5){
    color='var(--gold)'; label=`Losing fast — about ${fmt(Math.abs(slopePerWeek))} lbs/week`; arrow='down';
  } else if(slopePerWeek <= -0.75){
    color='var(--pine)'; label=`Trending down — about ${fmt(Math.abs(slopePerWeek))} lbs/week`; arrow='down';
  } else if(slopePerWeek < 0.25){
    color='var(--moss)'; label='Roughly flat this stretch'; arrow='flat';
  } else {
    color='var(--danger)'; label=`Trending up — about ${fmt(slopePerWeek)} lbs/week`; arrow='up';
  }
  const arrowGlyph = arrow==='down' ? '&#8595;' : arrow==='up' ? '&#8593;' : '&#8594;';

  // Daily readings are shown as light, secondary context — the dashed trend line
  // (and the Rolling weight average chart above) are the more meaningful signal.
  const dots = logs.map((l,i)=>{
    const x = mapX(i), y = mapY(l.weight);
    const tipLabel = `${prettyDate(l.date)} — ${fmt(l.weight)} lbs`;
    return `<circle cx="${x}" cy="${y}" r="10" fill="transparent" style="cursor:pointer;" onmousemove="showTrailTip(event,'${tipLabel}','trend-tip')" onmouseleave="hideTrailTip('trend-tip')"></circle>
      <circle cx="${x}" cy="${y}" r="2.75" fill="var(--card)" stroke="var(--moss)" stroke-width="1.2" style="pointer-events:none;"/>`;
  }).join('');

  return `
    <div class="trend-label">
      <span class="trend-arrow" style="background:${color}22; color:${color};">${arrowGlyph}</span>
      <span style="color:${color};">${label}</span>
    </div>
    <div class="trail-wrap trail-tip-wrap" style="position:relative;">
      <svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">
        <path d="${lineD}" fill="none" stroke="var(--line)" stroke-width="1.5"/>
        <line x1="${trendX1}" y1="${trendY1}" x2="${trendX2}" y2="${trendY2}" stroke="${color}" stroke-width="3" stroke-dasharray="5 5" stroke-linecap="round"/>
        ${dots}
      </svg>
      <div id="trend-tip" class="mono" style="display:none; position:absolute; pointer-events:none; background:var(--pine-dark); color:#fff; font-size:11.5px; padding:5px 9px; border-radius:8px; white-space:nowrap; transform:translate(-50%,-115%); z-index:5;"></div>
    </div>
    <div class="trend-sub">Based on your last ${n} weigh-ins, from ${prettyDate(logs[0].date)} to ${prettyDate(logs[n-1].date)}. Daily readings are shown light — see Rolling weight average above for the smoother trend.</div>
  `;
}

// ---------------- rolling average charts (7-day / 14-day) ----------------
// Unlike rollingAverageWeight() (last N log entries), these average by trailing
// calendar days so the window reflects actual elapsed time even with logging gaps.
function rollingWindowSeries(sortedLogs, dateKey, valueFn, windowDays){
  return sortedLogs.map(entry=>{
    const d = new Date(entry[dateKey]).getTime();
    const cutoff = d - (windowDays-1)*86400000;
    const inWindow = sortedLogs.filter(e=>{
      const t = new Date(e[dateKey]).getTime();
      return t >= cutoff && t <= d;
    });
    return inWindow.reduce((s,e)=>s+valueFn(e),0)/inWindow.length;
  });
}

function renderRollingLineChart(logs, dateKey, valueFn, opts={}){
  const unit = opts.unit || '';
  const decimals = opts.decimals===undefined ? 1 : opts.decimals;
  const sorted = [...logs].sort((a,b)=> new Date(a[dateKey])-new Date(b[dateKey]));
  if(sorted.length < 2){
    return `<div class="empty-state">Log at least 2 days to see rolling averages.</div>`;
  }
  const r7 = rollingWindowSeries(sorted, dateKey, valueFn, 7);
  const r14 = rollingWindowSeries(sorted, dateKey, valueFn, 14);
  const n = sorted.length;
  const stepX = Math.max(28, Math.min(50, 340/(n-1||1)));
  const padTop=18, padBottom=26, padLeft=14;
  const w = Math.max(280, padLeft*2 + (n-1)*stepX);
  const h = 150;
  const allVals = [...r7, ...r14];
  const minV = Math.min(...allVals), maxV = Math.max(...allVals);
  const range = (maxV - minV) || 1;
  const plotTop = padTop, plotBottom = h - padBottom;
  const mapY = (val)=> plotTop + ((maxV - val)/range) * (plotBottom - plotTop);
  const mapX = (i)=> padLeft + i*stepX;
  const pathFor = (series)=> series.map((v,i)=> (i===0? `M ${mapX(i)} ${mapY(v)}` : ` L ${mapX(i)} ${mapY(v)}`)).join('');
  // 14-day is the primary/headline trend (solid line + dots, drawn on top); 7-day is
  // secondary context (dashed, drawn underneath) — the 14-day window is less noisy
  // day-to-day and is what the user wants to focus on.
  const tipId = opts.tipId || 'rolling-tip';
  const dots14 = r14.map((v,i)=>{
    const x = mapX(i), y = mapY(v);
    const tipLabel = `${prettyDate(sorted[i][dateKey])} — 14-day: ${fmt(v,decimals)}${unit}, 7-day: ${fmt(r7[i],decimals)}${unit}`;
    return `<circle cx="${x}" cy="${y}" r="10" fill="transparent" style="cursor:pointer;" onmousemove="showTrailTip(event,'${tipLabel}','${tipId}')" onmouseleave="hideTrailTip('${tipId}')"></circle>
      <circle cx="${x}" cy="${y}" r="2.5" fill="var(--pine)" style="pointer-events:none;"/>`;
  }).join('');
  const last7 = r7[r7.length-1], last14 = r14[r14.length-1];

  return `
    <div style="display:flex; gap:16px; flex-wrap:wrap; margin-bottom:10px; font-size:13px;">
      <span style="display:flex; align-items:center; gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--pine);"></span>14-day avg: <strong class="mono">${fmt(last14,decimals)}${unit}</strong></span>
      <span style="display:flex; align-items:center; gap:6px;"><span style="width:10px;height:2px;background:var(--gold);"></span>7-day avg: <strong class="mono">${fmt(last7,decimals)}${unit}</strong></span>
    </div>
    <div class="trail-wrap trail-tip-wrap" style="position:relative;">
      <svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">
        <path d="${pathFor(r7)}" fill="none" stroke="var(--gold)" stroke-width="2" stroke-dasharray="5 5" stroke-linecap="round" opacity="0.75"/>
        <path d="${pathFor(r14)}" fill="none" stroke="var(--pine)" stroke-width="3" stroke-linecap="round"/>
        ${dots14}
      </svg>
      <div id="${tipId}" class="mono" style="display:none; position:absolute; pointer-events:none; background:var(--pine-dark); color:#fff; font-size:11.5px; padding:5px 9px; border-radius:8px; white-space:nowrap; transform:translate(-50%,-115%); z-index:5;"></div>
    </div>
    <div class="trend-sub">Rolling averages from ${prettyDate(sorted[0][dateKey])} to ${prettyDate(sorted[n-1][dateKey])}, based on ${n} logged day${n===1?'':'s'}.</div>
  `;
}

function renderRollingWeightChart(){
  return renderRollingLineChart(state.weightLogs, 'date', l=>l.weight, {unit:' lbs', decimals:1, tipId:'rollw-tip'});
}

function renderRollingCalorieChart(){
  return renderRollingLineChart(state.nutritionLogs, 'date', n=>nutritionTotalCalories(n), {unit:' cal', decimals:0, tipId:'rollc-tip'});

// Momentum read on the 7-day vs 14-day rolling averages themselves (distinct from
// renderWeeklyInsight's raw last-7-vs-prior-7 comparison): since the 14-day window
// fully contains the 7-day one, (14-day avg − 7-day avg) approximates half of the
// last week's rate of change under a roughly linear trend, so doubling it gives a
// comparable "implied lbs/week" figure. Reuses estimateCompletion() for any "days to
// next phase" figure rather than deriving a second, possibly-conflicting estimate.
function renderRollingWeightInsight(){
  const sorted = [...state.weightLogs].sort((a,b)=> new Date(a.date)-new Date(b.date));
  if(sorted.length < 7) return '';
  const r7 = rollingWindowSeries(sorted, 'date', l=>l.weight, 7);
  const r14 = rollingWindowSeries(sorted, 'date', l=>l.weight, 14);
  const last7 = r7[r7.length-1], last14 = r14[r14.length-1];

  const p = state.profile;
  const goalType = p.goalType || 'loss';
  const goalDir = goalType==='gain' ? -1 : 1; // for gain, "good" momentum is the opposite sign of raw
  const raw = last14 - last7; // positive when the 7-day average sits below the 14-day average
  const impliedWeeklyRate = raw * 2 * goalDir;

  let msg;
  if(goalType==='maintain'){
    if(Math.abs(impliedWeeklyRate) <= 1){
      msg = `Your 7-day and 14-day averages are close together — you're holding steady right around your maintenance target.`;
    } else if(raw > 0){
      msg = `Your 7-day average has dipped below your 14-day average — you're trending down about ${fmt(Math.abs(impliedWeeklyRate))} lbs/week. Consider adding a bit more food to stay level.`;
    } else {
      msg = `Your 7-day average has crept above your 14-day average — you're trending up about ${fmt(Math.abs(impliedWeeklyRate))} lbs/week. A small trim to calories should bring you back to level.`;
    }
  } else {
    const verb = goalType==='gain' ? 'gaining' : 'losing';
    if(impliedWeeklyRate < 0){
      msg = `Your 7-day average is ${goalType==='gain'?'below':'above'} your 14-day average — recent progress has slowed or reversed slightly (about ${fmt(Math.abs(impliedWeeklyRate))} lbs/week the wrong way). Double-check you're consistently hitting your calorie target.`;
    } else if(impliedWeeklyRate > 3){
      msg = `You're ${verb} faster than your recent baseline — about ${fmt(impliedWeeklyRate)} lbs/week over the last week. That's ahead of the typical 1–2 lb/week pace; consider ${goalType==='gain'?'trimming back slightly':'adding 100–200 calories'} to keep it sustainable.`;
    } else if(impliedWeeklyRate >= 1){
      msg = `Nice momentum — your 7-day average is pulling your 14-day average ${goalType==='gain'?'up':'down'} at a solid ~${fmt(impliedWeeklyRate)} lbs/week.`;
    } else {
      msg = `Your 7-day and 14-day averages are nearly flat against each other — progress has slowed to under a pound a week. If this continues, consider adjusting your calorie target.`;
    }
    if(!isGoalReached()){
      const phases = computePhases(p);
      const dir = phaseDirection(phases);
      const avgW = rollingAverageWeight();
      const active = getActivePhase(phases, avgW);
      const distance = Math.max(0, dir>0 ? (active.weightTarget-avgW) : (avgW-active.weightTarget));
      if(distance > 0){
        const completion = estimateCompletion();
        const etaNote = completion.status==='ok' && completion.phaseDate ? `, estimated around ${prettyDateObj(completion.phaseDate)} at your current pace` : '';
        msg += ` You're ${fmt(distance,1)} lbs from your next calorie step at ${fmt(active.weightTarget,0)} lbs${etaNote}.`;
      }
    }
  }

  return `<div class="banner" style="margin-top:12px;">📈 <div>${msg}</div></div>`;
}

function renderWeeklyInsight(){
  const logs = [...state.weightLogs].sort((a,b)=> new Date(a.date)-new Date(b.date));
  if(logs.length < 4) return '';
  const now = new Date();
  const withinDays = (d, days)=> (now - new Date(d)) / 86400000 <= days;
  const last7 = logs.filter(l=> withinDays(l.date,7));
  const prev7 = logs.filter(l=> { const days = (now-new Date(l.date))/86400000; return days>7 && days<=14; });
  if(last7.length<2 || prev7.length<2) return '';
  const avg = arr => arr.reduce((s,l)=>s+l.weight,0)/arr.length;
  const rate = avg(prev7) - avg(last7); // positive = losing week-over-week
  let msg, tone='pine-tint';
  if(rate > 3){ msg = `You're averaging about ${fmt(rate)} lbs/week — faster than the ideal 1–2 lbs. Consider adding 100–200 calories to protect your energy and muscle.`; }
  else if(rate >= 1){ msg = `Great pace — you're averaging about ${fmt(rate)} lbs/week, right in the ideal 1–2 lb range. Keep going.`; }
  else if(rate > 0){ msg = `Progress has slowed to about ${fmt(rate)} lbs/week. If this continues for a few more weeks, consider a small calorie cut or adding activity.`; }
  else { msg = `Your weight hasn't moved much this week. That's normal short-term — keep logging and watch the weekly trend.`; }

  // This 2-week snapshot can visibly disagree with the longer-history Weight trend
  // chart if a single unusual weigh-in falls inside one of the 7-day windows — flag
  // it rather than leave two contradictory-looking numbers unexplained on the page.
  const trend = computeTrend();
  if(trend){
    const longTermRate = -trend.slopePerWeek; // same sign convention as `rate` (positive = losing)
    if(Math.abs(rate - longTermRate) > 2){
      msg += ` (Your longer-term Weight trend below tells a different story — a single unusual weigh-in in the last two weeks can skew this short-term number.)`;
    }
  }
  return `<div class="section-title">Weekly insight</div><div class="banner">📊 <div>${msg}</div></div>`;
}

function renderRoadmap(){
  const p = state.profile;
  const phases = computePhases(p);
  const dir = phaseDirection(phases);
  const avgW = rollingAverageWeight();
  const active = getActivePhase(phases, avgW);
  const calibration = hasBodyStats(p) ? computeCalibration() : null;
  const notes = [];
  if(calibration) notes.push(`calorie targets below are calibrated ${calibration.calibrationFactor>=1?'up':'down'} ${fmt(Math.abs((calibration.calibrationFactor-1)*100),1)}% based on your logged results`);
  if(p.taperDeficit) notes.push(`${(p.goalType||'loss')==='gain'?'surplus':'deficit'} tapers by up to 40% over the final third of your journey`);
  const el = document.getElementById('view-roadmap');
  el.innerHTML = `
    <h1 class="page-title">Roadmap</h1>
    <p class="page-sub">${phases.length} phases from ${fmt(p.startWeight,0)} to ${fmt(p.goalWeight,0)} lbs, stepping every ${p.interval} lbs. Progress is based on your ${Math.min(state.weightLogs.length, ROLLING_WINDOW)}-log rolling average of ${fmt(avgW)} lbs.</p>

            </div>
          </div>
          ${badge}
        </div>`;
      }).join('')}
    </div>
  `;
}

  });
  document.getElementById('act-food-search-btn').onclick = ()=> openFoodSearch('new');

  document.getElementById('btn-act-save').onclick = async ()=>{
    const date = document.getElementById('act-date').value || todayStr();
    const weightVal = parseFloat(document.getElementById('act-weight').value);
    const protein = parseFloat(document.getElementById('act-protein').value) || 0;
    const carbs = parseFloat(document.getElementById('act-carbs').value) || 0;
    const fat = parseFloat(document.getElementById('act-fat').value) || 0;
    const water = parseFloat(document.getElementById('act-water').value) || 0;
    const notes = document.getElementById('act-notes').value.trim();
    const meals = activityDraftMeals
      .filter(m=> parseFloat(m.calories)>0)
      .map(m=>({id:m.id||cryptoId(), label: MEAL_CATEGORIES.includes(m.label)?m.label:'Other', calories: parseFloat(m.calories)||0, ...(m.foodName?{foodName:m.foodName}:{})}));

    const hasWeight = weightVal > 0;
    const hasMeals = meals.length > 0;
    if(!hasWeight && !hasMeals){ showToast('Enter a weight or at least one calorie entry.'); return; }

    if(hasWeight){
      const existingSameDate = state.weightLogs.find(l=>l.date===date);
      const outlier = findWeightOutlier(weightVal, date, existingSameDate?.id);
      if(outlier && !confirm(`That's ${fmt(outlier.diff,1)} lbs from your last entry (${fmt(outlier.mostRecent.weight)} lbs on ${prettyDate(outlier.mostRecent.date)}). Save ${fmt(weightVal)} lbs anyway?`)){
        return;
      }
    }

    const phasesBefore = computePhases(state.profile);
    const activeBefore = getActivePhase(phasesBefore, rollingAverageWeight());
    const goalBefore = isGoalReached();

    if(hasWeight){
      state.weightLogs = state.weightLogs.filter(l=>l.date!==date);
      state.weightLogs.push({id:cryptoId(), date, weight:weightVal, notes});
    }
    if(hasMeals){
      state.nutritionLogs = state.nutritionLogs.filter(n=>n.date!==date);
      state.nutritionLogs.push({id:cryptoId(), date, meals, protein, carbs, fat, water});
    }
    await saveState();
    activityDraftMeals = [emptyMealRow()];

    if(hasWeight){
      const activeAfter = getActivePhase(phasesBefore, rollingAverageWeight());
      const goalAfter = isGoalReached();
      if(goalAfter && !goalBefore){
        showToast(`🎉 Goal reached! You hit your target weight of ${fmt(state.profile.goalWeight,0)} lbs.`);
      } else if(activeAfter.id !== activeBefore.id){
        showToast(`🏁 Milestone reached! Calorie target updated from ${activeBefore.eating} to ${activeAfter.eating}.`);
      } else {
        showToast('Entry saved.');
      }
    } else {
      showToast('Entry saved.');
    }
    renderAll();
    goTab('dashboard');
  };

  if(editingActivityDate){
    renderMealRows('eact-meals', editActivityDraftMeals, 'edit');
    bindMealHandlers('edit');
    document.getElementById('eact-add-meal').onclick = ()=>{
      editActivityDraftMeals.push(emptyMealRow());
      renderMealRows('eact-meals', editActivityDraftMeals, 'edit');
      bindMealHandlers('edit');
    };
    document.querySelectorAll('#eact-quick-add .chip').forEach(chip=>{
      chip.onclick = ()=> quickAddMeal('edit', chip.dataset.cat);
    });
    document.getElementById('eact-food-search-btn').onclick = ()=> openFoodSearch('edit');
    document.getElementById('eact-save').onclick = ()=> saveEditActivity(editingActivityDate);
    document.getElementById('eact-cancel').onclick = ()=> { editingActivityDate = null; renderLog(); };
  }

  bindDisclosureAnimations(el);
}

// Adds a new calorie line-item pre-filled with the tapped category, so common
// entries (Breakfast/Lunch/Dinner) don't require opening the category dropdown.
// Reuses the form's still-blank default row instead of stacking an empty one.
function quickAddMeal(mode, label){
  const arr = mode==='new' ? activityDraftMeals : editActivityDraftMeals;
  const isBlankDefault = arr.length===1 && !arr[0].calories;
  const row = { id: isBlankDefault ? arr[0].id : cryptoId(), label, calories:'' };
  if(isBlankDefault){ arr[0] = row; } else { arr.push(row); }
  const containerId = mode==='new' ? 'act-meals' : 'eact-meals';
  renderMealRows(containerId, arr, mode);
  bindMealHandlers(mode);
  const input = document.querySelector(`#${containerId} input.meal-cal[data-meal-id="${row.id}"]`);
  if(input) input.focus();
}

// Renders the calorie line-items (meals) for either the new-entry form or the
// inline edit form. Row add/remove re-renders this block; typing in a row just
// updates the in-memory draft + running total (see bindMealHandlers) so focus
// isn't lost on every keystroke.
function renderMealRows(containerId, meals, mode){
  const el = document.getElementById(containerId);
  if(!el) return;
  const rows = meals.map(m=>`
    <div class="row2" style="margin-bottom:${m.foodName?'2px':'8px'}; align-items:center;">
      <select class="meal-label" data-meal-id="${m.id}">
        ${MEAL_CATEGORIES.map(c=>`<option value="${c}" ${m.label===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <div style="display:flex; gap:6px; align-items:center;">
        <input type="number" class="meal-cal" data-meal-id="${m.id}" placeholder="Calories" inputmode="decimal" value="${m.calories===''||m.calories==null?'':m.calories}" style="flex:1;">
        ${meals.length>1 ? `<button type="button" class="del-btn meal-remove" data-meal-id="${m.id}" aria-label="Remove entry">✕</button>` : ''}
      </div>
    </div>
    ${m.foodName ? `<div class="helper" style="margin-bottom:8px;">from: ${escapeHtml(m.foodName)}</div>` : ''}
  `).join('');
  el.innerHTML = rows + `<div class="helper" id="${containerId}-total" style="margin-top:2px;">Total: ${mealsTotal(meals)} cal</div>`;
}

function bindMealHandlers(mode){
  const containerId = mode==='new' ? 'act-meals' : 'eact-meals';
  const container = document.getElementById(containerId);
  if(!container) return;
  const arr = mode==='new' ? activityDraftMeals : editActivityDraftMeals;

  container.querySelectorAll('.meal-label').forEach(sel=>{
    sel.onchange = ()=>{
      const m = arr.find(x=>x.id===sel.dataset.mealId);
      if(!m) return;
      m.label = sel.value;
    };
  });
  container.querySelectorAll('.meal-cal').forEach(inp=>{
    inp.oninput = ()=>{
      const m = arr.find(x=>x.id===inp.dataset.mealId);
      if(!m) return;
      m.calories = inp.value;
      const totalEl = document.getElementById(`${containerId}-total`);
      if(totalEl) totalEl.textContent = `Total: ${mealsTotal(arr)} cal`;
    };
  });
  container.querySelectorAll('.meal-remove').forEach(btn=>{
    btn.onclick = ()=>{
      let newArr = arr.filter(m=>m.id!==btn.dataset.mealId);
      if(newArr.length===0) newArr.push(emptyMealRow());
      if(mode==='new') activityDraftMeals = newArr; else editActivityDraftMeals = newArr;
      renderMealRows(containerId, newArr, mode);
      bindMealHandlers(mode);
    };
  });
}

// ---------------- food search (Open Food Facts) ----------------
function openFoodSearch(mode){
  foodSearchMode = mode;
  foodMealCategory = 'Other';
  foodSearchQuery = '';
  foodSearchResults = [];
  foodSearchStatus = 'idle';
  foodIdleTab = 'recent';
  foodSelected = null;
  foodCreatingCustom = false;
  foodScanning = false;
  document.getElementById('food-overlay').classList.remove('hidden');
  renderFoodOverlay();
}

function closeFoodSearch(){
  stopScanStream();
  document.getElementById('food-overlay').classList.add('hidden');
}

function renderFoodOverlay(){
  const el = document.getElementById('food-overlay-body');
  if(foodCreatingCustom){
    el.innerHTML = foodCustomFormMarkup();
    bindCustomFoodFormHandlers();
  } else if(foodScanning){
    el.innerHTML = foodScanMarkup();
    bindBarcodeScanHandlers();
  } else if(foodSelected){
    el.innerHTML = foodDetailMarkup();
    bindFoodDetailHandlers();
  } else {
    el.innerHTML = foodSearchMarkup();
    bindFoodSearchHandlers();
    renderFoodResultsList();
  }
}

function foodSearchMarkup(){
  return `
    <div class="field" style="margin-bottom:10px;">
      <input type="text" id="food-search-input" placeholder="Search foods, e.g. &quot;chicken breast&quot;" value="${escapeHtml(foodSearchQuery)}" autocomplete="off">
    </div>

      <button type="button" class="btn-link" id="food-scan-open-btn">📷 Scan a barcode</button>
      <button type="button" class="btn-link" id="food-custom-btn">+ Create a custom food</button>
    </div>
    <div id="food-results-list"></div>
  `;
}

function bindFoodSearchHandlers(){
  const input = document.getElementById('food-search-input');
  input.focus();
  input.selectionStart = input.selectionEnd = input.value.length;
  let debounceTimer;
  input.oninput = ()=>{
    foodSearchQuery = input.value;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(()=> runFoodSearch(foodSearchQuery), 350);
  };
  document.getElementById('food-scan-open-btn').onclick = openBarcodeScan;
  document.getElementById('food-custom-btn').onclick = ()=>{ foodCreatingCustom = true; renderFoodOverlay(); };
}

async function runFoodSearch(query){
  const token = ++foodSearchToken;
  if(!query.trim()){
    foodSearchStatus = 'idle';
    foodSearchResults = [];
    renderFoodResultsList();
    return;
  }
  foodSearchStatus = 'loading';
  renderFoodResultsList();
  try{
    const { products } = await FoodService.searchFoods(query);
    if(token !== foodSearchToken) return; // a newer search superseded this one
    foodSearchResults = products;
    foodSearchStatus = products.length ? 'ok' : 'empty';
  }catch(e){
    if(token !== foodSearchToken) return;
    foodSearchStatus = 'error';
  }
  renderFoodResultsList();
}

function renderFoodResultsList(){
  const el = document.getElementById('food-results-list');
  if(!el) return;
  if(foodSearchStatus === 'loading'){
    el.innerHTML = `<div class="empty-state">Searching…</div>`;
    return;
  }
  if(foodSearchStatus === 'idle'){
    const list = foodIdleTab==='frequent' ? FoodService.getFrequentFoods(10) : FoodService.getRecentFoods().slice(0,10);
    el.innerHTML = `
      <div class="chip-group" id="food-idle-tabs" style="margin-bottom:12px;">
        <div class="chip${foodIdleTab==='recent'?' active':''}" data-tab="recent">Recent</div>
        <div class="chip${foodIdleTab==='frequent'?' active':''}" data-tab="frequent">Frequent</div>
      </div>
      ${list.length ? `<div class="stack">${list.map(foodResultCardMarkup).join('')}</div>` : `<div class="empty-state">Search for a food to get started.</div>`}
    `;
    document.querySelectorAll('#food-idle-tabs .chip').forEach(chip=>{
      chip.onclick = ()=>{ foodIdleTab = chip.dataset.tab; renderFoodResultsList(); };
    });
    bindFoodResultClicks();
    return;
  }

  const customMatches = FoodService.searchCustomFoods(foodSearchQuery);
  const customSection = customMatches.length ? `
    <div class="section-title" style="font-size:12px; margin:0 0 10px;">Your foods</div>
    <div class="stack" style="margin-bottom:16px;">${customMatches.map(foodResultCardMarkup).join('')}</div>
  ` : '';

  if(foodSearchStatus === 'error'){
    el.innerHTML = customSection + `<div class="empty-state">Couldn't reach Open Food Facts. Check your connection and try again.</div>`;
    bindFoodResultClicks();
    return;
  }
  if(foodSearchStatus === 'empty' && customMatches.length===0){
    el.innerHTML = `<div class="empty-state">No foods found for "${escapeHtml(foodSearchQuery)}".</div>`;
    return;
  }
  const apiSection = foodSearchStatus === 'ok' ? `<div class="stack">${foodSearchResults.map(foodResultCardMarkup).join('')}</div>` : '';
  el.innerHTML = customSection + apiSection;
  bindFoodResultClicks();
}

function bindFoodResultClicks(){
  document.querySelectorAll('.food-result-card').forEach(card=>{
    card.onclick = ()=>{
      const id = card.dataset.foodId;
      const pool = foodSearchStatus==='idle'
        ? (foodIdleTab==='frequent' ? FoodService.getFrequentFoods(10) : FoodService.getRecentFoods())
        : [...FoodService.searchCustomFoods(foodSearchQuery), ...foodSearchResults];
      const food = pool.find(f=>f.id===id);
      if(food) selectFood(food);
    };
  });
  document.querySelectorAll('.food-custom-delete').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      FoodService.deleteCustomFood(btn.dataset.foodId);
      renderFoodResultsList();
    };
  });
}
